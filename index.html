<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animalito Lotto</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <div class="user-container">
                <div id="user-avatar-container" class="avatar-placeholder">
                    <img id="user-photo" src="" alt="" style="display:none;">
                    <span id="user-initials">--</span>
                </div>
                <div class="user-info">
                    <span id="user-name">Cargando...</span>
                    <div class="balance-pill">
                        <span class="icon">🥬</span>
                        <span id="balance">0</span>
                    </div>
                </div>
            </div>
        </header>

        <main id="main-content">
            <div class="loader">Cargando sección...</div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" onclick="showSection('lobby')">🏠 Lobby</button>
            <button class="nav-item" onclick="showSection('tareas')">📋 Tareas</button>
            <button class="nav-item" onclick="showSection('wallet')">👛 Wallet</button>
            <button class="nav-item" onclick="showSection('amigos')">👥 Amigos</button>
        </nav>
    </div>

    <!-- DEBUGGING - Quita esto cuando todo funcione -->
    <script>
        console.log("🚀 Iniciando Lotto Mini App...");
        console.log("Telegram disponible:", !!window.Telegram);
        console.log("TON_CONNECT_UI disponible:", typeof TON_CONNECT_UI !== 'undefined');
    </script>

    <script src="app.js"></script>
</body>
</html>
