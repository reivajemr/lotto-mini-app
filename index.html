<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animalito Lotto</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://adsgram.ai/js/adsgram-sdk.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; margin: 0; padding: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #1e1e1e; border-bottom: 1px solid #333; }
        .user-info { display: flex; flex-direction: column; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #1a1a1a; padding: 10px 0; border-top: 1px solid #333; }
        .nav-bar button { background: none; border: none; color: white; font-size: 10px; cursor: pointer; }
        .section { padding: 20px; display: none; padding-bottom: 80px; }
        .btn-action { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; margin-bottom: 10px; cursor: pointer; color: white; }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-info">
            <span id="user-name" style="font-weight: bold;">Cargando...</span>
            <div style="font-size: 14px; margin-top: 5px;">
                <span>🥬 <span id="user-coins">0</span></span>
                <span style="margin-left: 10px;">💎 <span id="user-gems">0.00</span></span>
            </div>
        </div>
        <div id="ton-connect"></div>
    </div>

    <div id="home-section" class="section" style="display: block; text-align: center;">
        <h2>🎰 Lobby</h2>
        <p>¡Bienvenido al juego de los Animalitos!</p>
        </div>

    <div id="tasks-section" class="section">
        <h2 style="text-align: center;">📋 Tareas Diarias</h2>
        <div style="background: #2a2a2a; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <div>
                <p style="margin:0; font-weight:bold;">Ver Publicidad</p>
                <small style="color: #4caf50;">Recompensa: +10 🥬</small>
            </div>
            <button onclick="verAnuncio()" style="background:#0088cc; color:white; border:none; padding:8px 15px; border-radius:8px;">Ver</button>
        </div>
    </div>

    <div id="wallet-section" class="section" style="text-align: center;">
        <h2>💰 Mi Billetera</h2>
        <div style="background: #2a2a2a; padding: 20px; border-radius: 15px; margin-bottom: 20px;">
            <p style="margin: 0; color: #aaa;">Saldo Actual</p>
            <h1 style="margin: 10px 0;"><span id="wallet-coins-display">0</span> 🥬</h1>
        </div>
        <button onclick="comprarLechugas()" class="btn-action" style="background: #4caf50;">📥 Comprar 1,000 🥬 (0.1 TON)</button>
        <button onclick="solicitarRetiro()" class="btn-action" style="background: #444;">📤 Retirar (Mín. 50,000 🥬)</button>
        <p style="font-size: 11px; color: #777;">* Retiros manuales para tu seguridad.</p>
    </div>

    <div id="referrals-section" class="section" style="text-align: center;">
        <h2>👥 Amigos</h2>
        <p>Invita a tus amigos y gana comisiones.</p>
    </div>

    <div class="nav-bar">
        <button onclick="showSection('home')">🏠<br>Lobby</button>
        <button onclick="showSection('tasks')">📋<br>Tareas</button>
        <button onclick="showSection('wallet')">💰<br>Wallet</button>
        <button onclick="showSection('referrals')">👥<br>Amigos</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
