<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Animalito Lotto</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #1e1e1e; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #1a1a1a; padding: 10px 0; border-top: 1px solid #333; z-index: 100; }
        .nav-bar button { background: none; border: none; color: white; font-size: 10px; cursor: pointer; }
        .section { padding: 20px; display: none; padding-bottom: 100px; min-height: 80vh; text-align: center; }
        .btn-action { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; margin-bottom: 15px; cursor: pointer; color: white; font-size: 16px; }
        
        /* Pantalla de carga para que no se vea azul al inicio */
        #loading-screen { position: fixed; inset: 0; background: #121212; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: #4caf50; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p>Iniciando...</p>
    </div>

    <div class="header">
        <div style="text-align: left;">
            <span id="user-name" style="font-weight: bold;">Cargando...</span>
            <div style="font-size: 14px; margin-top: 5px;">
                <span>🥬 <span id="user-coins">0</span></span>
            </div>
        </div>
        <div id="ton-connect"></div>
    </div>

    <div id="home-section" class="section" style="display: block;">
        <h2 style="color: #ffcc00;">🎰 Lobby</h2>
        <div style="font-size: 50px; margin: 20px;">🎰</div>
        <p>¡Bienvenido a la granja!</p>
    </div>

    <div id="tasks-section" class="section">
        <h2>📋 Tareas</h2>
        <p>El sistema de publicidad se está actualizando.</p>
        <button onclick="verAnuncio()" class="btn-action" style="background: #333;">🎬 Ver Anuncio</button>
    </div>

    <div id="wallet-section" class="section">
        <h2 style="color: #4caf50;">💰 Mi Billetera</h2>
        <div style="background: #2a2a2a; padding: 25px; border-radius: 20px; margin-bottom: 25px; border: 1px solid #333;">
            <p style="margin: 0; color: #aaa;">Saldo Disponible</p>
            <h1 style="margin: 10px 0; font-size: 35px;"><span id="wallet-coins-display">0</span> 🥬</h1>
        </div>
        <button onclick="comprarLechugas()" class="btn-action" style="background: #4caf50;">📥 Comprar 1,000 🥬 (0.1 TON)</button>
        <button onclick="solicitarRetiro()" class="btn-action" style="background: #333;">📤 Retirar</button>
    </div>

    <div id="referrals-section" class="section">
        <h2>👥 Amigos</h2>
        <p>¡Invita a tus amigos próximamente!</p>
    </div>

    <div class="nav-bar">
        <button onclick="showSection('home')">🏠<br>Lobby</button>
        <button onclick="showSection('tasks')">📋<br>Tareas</button>
        <button onclick="btnWallet()">💰<br>Wallet</button>
        <button onclick="showSection('referrals')">👥<br>Amigos</button>
    </div>

    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js" defer></script>
    <script src="app.js"></script>
</body>
</html>
