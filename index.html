<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
      <header style="display: flex; justify-content: space-between; align-items: center; padding: 5px 10px; background: #1a1a1a; border-bottom: 1px solid #333; height: 65px;">
    
    <div style="display: flex; align-items: center; min-width: 50px;">
        <img src="icon.png" id="user-avatar" style="width: 45px; height: 45px; border-radius: 50%; border: 2px solid #0088cc;">
    </div>

    <div style="display: flex; flex-direction: column; align-items: center; gap: 2px; flex-grow: 1;">
        <div style="display: flex; align-items: center; gap: 5px; background: #2a2a2a; padding: 2px 8px; border-radius: 12px;">
            <span style="font-size: 12px;">🟡</span>
            <span id="user-coins" style="font-size: 13px; font-weight: bold; color: #ffcc00;">0</span>
        </div>
        <div style="display: flex; align-items: center; gap: 5px; background: #2a2a2a; padding: 2px 8px; border-radius: 12px;">
            <span style="font-size: 12px;">💎</span>
            <span id="user-gems" style="font-size: 13px; font-weight: bold; color: #00ccff;">0.00</span>
        </div>
    </div>

    <div style="min-width: 100px; display: flex; justify-content: flex-end;">
        <div id="ton-connect" style="transform: scale(0.8); transform-origin: right;"></div>
    </div>

</header>

        <main id="main-content">
<section id="home-section">
    <h2 style="text-align: center;">🎰 Lobby</h2>
   
</section>
            <section id="tasks-section" style="display: none;">
                <h2>📺 Gana Lechugas Gratis</h2>
                    <p>Mira anuncios y completa misiones para recargar tu saldo.</p>
    
                    <div class="task-card">
                        <div class="task-info">
                            <span>Ver Anuncio de Video</span>
                            <small>+10 🥬</small>
                        </div>
                        <button class="btn-task" onclick="mostrarAnuncio()">VER</button>
                    </div>
            
                    <div class="task-card">
                        <div class="task-info">
                            <span>Unirse al Canal Oficial</span>
                            <small>+50 🥬</small>
                        </div>
                        <button class="btn-task" onclick="window.open('https://t.me/TuCanal', '_blank')">UNIRSE</button>
                    </div>
            </section>

<section id="wallet-section" style="display: none;">
    <div style="padding: 20px; text-align: center;">
        <h2 style="margin-bottom: 20px;">💰 Mi Billetera</h2>
        
        <div id="ton-connect-button" style="display: flex; justify-content: center; align-items: center; min-height: 48px; width: 100%; margin: 0 auto;"></div>
        
    </div>
</section>

            
        </main>

        <nav class="bottom-nav">
            <button onclick="showSection('home')">🏠 Lobby</button>
            <button onclick="showSection('tasks')">📺 Tareas</button>
            <button onclick="showSection('wallet')">💰 Wallet</button>
            <button onclick="showSection('referrals')">👥 Amigos</button>
        </nav>
    </div>

    <script src="app.js?v=1.1"></script>
</body>
</html>
