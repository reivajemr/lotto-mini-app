<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
<header style="display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #1a1a1a; border-bottom: 1px solid #333; min-height: 80px;">
    
    <div style="display: flex; flex-direction: column; align-items: flex-start; gap: 5px; min-width: 120px;">
        <div style="display: flex; align-items: center; gap: 8px;">
            <img src="icon.png" id="user-avatar" style="width: 35px; height: 35px; border-radius: 50%; border: 1px solid #0088cc;">
            <span id="user-name" style="font-size: 12px; font-weight: bold; color: white;">Cargando...</span>
        </div>
        
        <div style="display: flex; gap: 5px;">
            <div style="background: #2a2a2a; padding: 2px 6px; border-radius: 8px; display: flex; align-items: center; gap: 3px;">
                <span style="font-size: 10px;">🥬</span>
                <span id="user-coins" style="font-size: 11px; color: #ffcc00;">0</span>
            </div>
            <div style="background: #2a2a2a; padding: 2px 6px; border-radius: 8px; display: flex; align-items: center; gap: 3px;">
                <span style="font-size: 10px;">💎</span>
                <span id="user-gems" style="font-size: 11px; color: #00ccff;">0.00</span>
            </div>
        </div>
    </div>

    <div style="flex-shrink: 0;">
        <div id="ton-connect"></div>
    </div>

</header>

        <main id="main-content">
<section id="home-section">
    <h2 style="text-align: center;">🎰 Lobby</h2>
   
</section>
            <section id="tasks-section" style="display: none;">
                <h2>📺 Gana Lechugas Gratis</h2>
                    <p>Mira anuncios y completa misiones para recargar tu saldo.</p>
    
                    <div class="task-card">
                        <div class="task-info">
                            <span>Ver Anuncio de Video</span>
                            <small>+10 🥬</small>
                        </div>
                        <button class="btn-task" onclick="mostrarAnuncio()">VER</button>
                    </div>
            
                    <div class="task-card">
                        <div class="task-info">
                            <span>Unirse al Canal Oficial</span>
                            <small>+50 🥬</small>
                        </div>
                        <button class="btn-task" onclick="window.open('https://t.me/TuCanal', '_blank')">UNIRSE</button>
                    </div>
            </section>

<section id="wallet-section" style="display: none;">
    <div style="padding: 20px; text-align: center;">
        <h2 style="margin-bottom: 20px;">💰 Mi Billetera</h2>
        
        <div id="ton-connect-button" style="display: flex; justify-content: center; align-items: center; min-height: 48px; width: 100%; margin: 0 auto;"></div>
        
    </div>
</section>

            
        </main>

<nav style="position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #1a1a1a; padding: 10px 0; border-top: 1px solid #333;">
<div style="position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #1a1a1a; padding: 10px 0; border-top: 1px solid #333;">
    
    <button onclick="showSection('home')" style="background:none; border:none; color:white; font-size:10px;">
        🏠<br>Lobby
    </button>

    <button onclick="showSection('tasks')" style="background:none; border:none; color:white; font-size:10px;">
        📋<br>Tareas
    </button>

    <button onclick="showSection('wallet')" style="background:none; border:none; color:white; font-size:10px;">
        💰<br>Wallet
    </button>

    <button onclick="showSection('referrals')" style="background:none; border:none; color:white; font-size:10px;">
        👥<br>Amigos
    </button>

</div>
</nav>
    </div>

    <script src="app.js?v=1.1"></script>
</body>
</html>
