<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Animalito Lotto</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; margin: 0; padding: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #1e1e1e; border-bottom: 1px solid #333; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #1a1a1a; padding: 10px 0; border-top: 1px solid #333; }
        .nav-bar button { background: none; border: none; color: white; font-size: 10px; }
        .section { padding: 20px; display: none; padding-bottom: 100px; }
        .btn-action { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; margin-bottom: 15px; color: white; font-size: 16px; }
        #loading-screen { position: fixed; inset: 0; background: #121212; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div style="border: 4px solid #333; border-left-color: #4caf50; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
        <p>Cargando lechugas...</p>
    </div>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

    <div class="header">
        <div>
            <span id="user-name" style="font-weight: bold;">Cargando...</span>
            <div style="font-size: 14px; margin-top: 5px;">
                <span>🥬 <span id="user-coins">0</span></span>
            </div>
        </div>
        <div id="ton-connect"></div>
    </div>

    <div id="home-section" class="section" style="display: block; text-align: center;">
        <h2>🎰 Lobby</h2>
        <p>¡Bienvenido!</p>
    </div>

    <div id="wallet-section" class="section" style="text-align: center;">
        <h2>💰 Wallet</h2>
        <div style="background: #2a2a2a; padding: 25px; border-radius: 20px; margin-bottom: 25px;">
            <h1 style="margin:0;"><span id="wallet-coins-display">0</span> 🥬</h1>
        </div>
        <button onclick="comprarLechugas()" class="btn-action" style="background: #4caf50;">📥 Comprar 1,000 🥬</button>
        <button onclick="solicitarRetiro()" class="btn-action" style="background: #333;">📤 Retirar</button>
    </div>

    <div class="nav-bar">
        <button onclick="showSection('home')">🏠<br>Lobby</button>
        <button onclick="showSection('wallet')">💰<br>Wallet</button>
    </div>

    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js" defer></script>
    <script src="https://adsgram.ai/js/adsgram-sdk.js" defer></script>
    <script src="app.js"></script>
</body>
</html>
