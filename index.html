<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animalito Lotto</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <div class="user-info">
                <span id="user-name">Cargando...</span>
                <div class="balance-container">
                    <span class="icon">🥬</span> 
                    <span id="balance">0</span>
                </div>
            </div>
            <button id="connect-wallet-btn" class="wallet-btn">
                Connect Wallet
            </button>
        </header>

        <main>
            <div id="lobby" class="section active">
                <h1>🎰 Lobby</h1>
                <p>¡Bienvenido a Animalito Lotto!</p>
            </div>

            <div id="tasks" class="section" style="display:none;">
                <h1>📋 Tareas</h1>
                <p>Completa misiones para ganar lechugas.</p>
            </div>

            <div id="wallet" class="section" style="display:none;">
                <h1>👛 Wallet</h1>
                <p>Gestiona tus fondos.</p>
                <div style="text-align: center; margin-top: 20px;">
                    <button class="wallet-btn" onclick="alert('Funcionalidad de compra en desarrollo')">
                        Comprar 1000 Lechugas
                    </button>
                </div>
            </div>

            <div id="referrals" class="section" style="display:none;">
                <h1>👥 Amigos</h1>
                <p>Invita y gana bonificaciones.</p>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item" onclick="showSection('lobby')">🏠 Lobby</button>
            <button class="nav-item" onclick="showSection('tasks')">📋 Tareas</button>
            <button class="nav-item" onclick="showSection('wallet')">👛 Wallet</button>
            <button class="nav-item" onclick="showSection('referrals')">👥 Amigos</button>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
