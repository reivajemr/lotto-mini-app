<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lotto Animalitos Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header class="user-header">
            <div class="user-info">
                <img id="user-photo" src="https://via.placeholder.com/40" alt="Avatar">
                <span id="user-name">Cargando...</span>
            </div>
            <div class="balances">
                <div class="balance-item">🥬 <span id="val-lechugas">0</span></div>
                <div class="balance-item">💎 <span id="val-ton">0.00</span></div>
            </div>
        </header>

        <main id="main-content">
            <section id="home-section">
                <div class="banner">¡Sorteo de las 10:00 AM en curso!</div>
                <button class="btn-play" onclick="abrirJuego()">🎰 JUGAR AHORA</button>
            </section>
            <section id="tasks-section" style="display: none;">
                <h2>📺 Gana Lechugas Gratis</h2>
                    <p>Mira anuncios y completa misiones para recargar tu saldo.</p>
    
                    <div class="task-card">
                        <div class="task-info">
                            <span>Ver Anuncio de Video</span>
                            <small>+10 🥬</small>
                        </div>
                        <button class="btn-task" onclick="mostrarAnuncio()">VER</button>
                    </div>
            
                    <div class="task-card">
                        <div class="task-info">
                            <span>Unirse al Canal Oficial</span>
                            <small>+50 🥬</small>
                        </div>
                        <button class="btn-task" onclick="window.open('https://t.me/TuCanal', '_blank')">UNIRSE</button>
                    </div>
            </section>

<section id="wallet-section" style="display: none;">
    <div class="wallet-card">
        <h2>💰 Mi Billetera</h2>
        <div id="ton-connect-button"></div> 
        
        <div id="wallet-details" style="display: none; margin-top: 20px;">
            <p>Estado: <span style="color: #4caf50;">✅ Conectado</span></p>
            <p><small id="wallet-address">...</small></p>
            <div class="wallet-actions">
                <button class="btn-deposit" onclick="solicitarDeposito()">📥 Depositar</button>
                <button class="btn-withdraw" onclick="solicitarRetiro()">📤 Retirar</button>
            </div>
        </div>
    </div>
</section>

            
        </main>

        <nav class="bottom-nav">
            <button onclick="showSection('home')">🏠 Lobby</button>
            <button onclick="showSection('tasks')">📺 Tareas</button>
            <button onclick="showSection('wallet')">💰 Wallet</button>
            <button onclick="showSection('referrals')">👥 Amigos</button>
        </nav>
    </div>

    
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
