<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animalito Lotto</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
<header>
    <div class="user-container">
        <img id="user-photo" src="https://via.placeholder.com/42" alt="avatar" class="avatar">
        <div class="user-info">
            <span id="user-name">Cargando...</span>
            <div class="balance-pill">
                <span class="icon">🥬</span>
                <span id="balance">0</span>
            </div>
        </div>
    </div>
    </header>

        <main id="main-content">
            <div class="loader">Cargando sección...</div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item" onclick="showSection('lobby')">🏠 Lobby</button>
            <button class="nav-item" onclick="showSection('tareas')">📋 Tareas</button>
            <button class="nav-item" onclick="showSection('wallet')">👛 Wallet</button>
            <button class="nav-item" onclick="showSection('amigos')">👥 Amigos</button>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
