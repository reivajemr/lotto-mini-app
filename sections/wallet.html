<div class="wallet-container">
    <div class="tab-selector">
        <button class="tab-btn active" onclick="window.switchWalletTab('deposit')">Depositar</button>
        <button class="tab-btn" onclick="window.switchWalletTab('withdraw')">Retirar</button>
    </div>

    <div id="deposit-content" class="wallet-tab-content">
        <div class="wallet-card">
            <h3>🔐 Conectar Wallet</h3>
            <p style="font-size: 0.85em; color: #aaa; margin-bottom: 15px;">Conecta tu wallet TON para realizar transacciones</p>
            
            <div id="ton-connect-button-container" style="display: flex; justify-content: center; min-height: 50px;"></div>
            <div id="wallet-status" style="display: none; margin-top: 15px; padding: 10px; background: rgba(76, 175, 80, 0.2); border: 1px solid rgba(76, 175, 80, 0.5); border-radius: 8px; text-align: center; font-size: 13px; color: #4caf50;"></div>
        </div>

        <div class="wallet-card" style="margin-top: 20px;">
            <h3>📥 Comprar Lechugas</h3>
            <p style="font-size: 0.85em; color: #aaa; margin-bottom: 15px;">Tasa: 1000 🥬 = 0.1 TON</p>
            
            <div class="pack-list">
                <button class="pack-item" onclick="window.initPurchase(1000, 0.1)">
                    <span style="display: block; font-size: 14px;">1.000 🥬</span>
                    <span style="display: block; font-size: 11px; color: #aaa; margin-top: 4px;">0.1 TON</span>
                </button>
                <button class="pack-item" onclick="window.initPurchase(5000, 0.5)">
                    <span style="display: block; font-size: 14px;">5.000 🥬</span>
                    <span style="display: block; font-size: 11px; color: #aaa; margin-top: 4px;">0.5 TON</span>
                </button>
                <button class="pack-item" onclick="window.initPurchase(10000, 1.0)">
                    <span style="display: block; font-size: 14px;">10.000 🥬</span>
                    <span style="display: block; font-size: 11px; color: #aaa; margin-top: 4px;">1.0 TON</span>
                </button>
                <button class="pack-item" onclick="window.initPurchase(50000, 5.0)">
                    <span style="display: block; font-size: 14px;">50.000 🥬</span>
                    <span style="display: block; font-size: 11px; color: #aaa; margin-top: 4px;">5.0 TON</span>
                </button>
            </div>
        </div>
    </div>

    <div id="withdraw-content" class="wallet-tab-content" style="display:none;">
        <div class="wallet-card">
            <h3>📤 Retirar Ganancias (TON)</h3>
            <p style="font-size: 0.85em; color: #aaa; margin-bottom: 15px;">
                Canjea tus lechugas por TON real<br>
                <strong>Mínimo: 5 TON | Máximo: 20 TON</strong>
            </p>
            
            <div class="wallet-card" style="background: rgba(0, 136, 204, 0.15); border: 1px solid rgba(0, 136, 204, 0.3); margin-bottom: 15px;">
                <p style="font-size: 12px; margin: 0;">
                    <strong>Tasa de conversión:</strong><br>
                    1 TON = 10.000 🥬
                </p>
            </div>
            
            <div class="input-group" style="margin-top:10px;">
                <label style="display: block; margin-bottom: 8px; font-size: 13px; font-weight: bold;">Monto en TON a retirar:</label>
                <input type="number" id="withdraw-ton" placeholder="Ej: 5.0" step="0.1" min="5" max="20" style="width: 100%; padding: 10px; border: 1px solid #444; border-radius: 8px; background: rgba(255,255,255,0.05); color: white; font-size: 14px;">
            </div>
            
            <button class="action-btn-red" onclick="window.requestWithdraw()">Solicitar Retiro</button>
            
            <p style="font-size: 11px; color: #888; margin-top: 10px; text-align: center;">
                ⏱️ El retiro se procesará en 24-48 horas
            </p>
        </div>
    </div>
</div>
