<div class="wallet-container">
    <div class="tab-selector">
        <button class="tab-btn active" onclick="switchWalletTab('deposit')">Depositar</button>
        <button class="tab-btn" onclick="switchWalletTab('withdraw')">Retirar</button>
    </div>

    <div id="deposit-content" class="wallet-tab-content">
        <div class="wallet-card">
            <h3>📥 Comprar Lechugas</h3>
            <p>Tasa: 1000 🥬 = 0.1 TON</p>
            
            <div class="pack-list">
                <button class="pack-item" onclick="initPurchase(1000, 0.1)">1.000 🥬 por 0.1 TON</button>
                <button class="pack-item" onclick="initPurchase(5000, 0.5)">5.000 🥬 por 0.5 TON</button>
                <button class="pack-item" onclick="initPurchase(10000, 1.0)">10.000 🥬 por 1.0 TON</button>
            </div>
        </div>
        <button id="connect-wallet-btn-inner" class="wallet-btn-styled">Connect Wallet</button>
    </div>

    <div id="withdraw-content" class="wallet-tab-content" style="display:none;">
        <div class="wallet-card">
            <h3>📤 Retirar Ganancias (TON)</h3>
            <p style="font-size: 0.8em; color: #aaa;">Mínimo: 5 TON | Máximo: 20 TON</p>
            
            <div class="input-group" style="margin-top:10px;">
                <label>Monto en TON a retirar:</label>
                <input type="number" id="withdraw-ton" placeholder="Ej: 5.0" step="0.1">
            </div>
            
            <button class="action-btn-red" onclick="requestWithdraw()">Solicitar Retiro</button>
        </div>
    </div>
</div>
